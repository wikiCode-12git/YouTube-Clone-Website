<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch - YouTube Clone</title>
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="menu-logo">
      <button id="menu-btn" class="icon-btn">
        <span class="material-icons">menu</span>
      </button>
      <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
        <span class="material-icons logo-icon">play_circle</span>
        <span>YouTube</span>
      </div>
    </div>
    
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search">
      <button id="search-btn">
        <span class="material-icons">search</span>
      </button>
    </div>
    
    <div class="profile">
      <button id="theme-btn" class="icon-btn">
        <span class="material-icons">dark_mode</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="watch-container">
    <div class="watch-left">
      <div class="video-player">
        <iframe id="video-frame" frameborder="0" allowfullscreen></iframe>
      </div>
      <div class="video-details">
        <h2 id="video-title"></h2>
        <div class="video-meta">
          <p id="video-channel"></p>
          <p id="video-views"></p>
        </div>
      </div>
    </div>

    <div class="watch-right">
      <h3>Related Videos</h3>
      <div id="related-videos">
        <!-- Related videos loaded by JS -->
      </div>
    </div>
  </main>

  <script src="js/watch.js"></script>
</body>
</html>
